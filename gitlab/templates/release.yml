---
build:docker:production:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE_TAG: "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$IMAGE_TAG" .
    - docker push "$IMAGE_TAG"
    - docker tag "$IMAGE_TAG" "$CI_REGISTRY_IMAGE:latest"
    - docker push "$CI_REGISTRY_IMAGE:latest"
  rules:
    - if: $CI_COMMIT_TAG

deploy:production:
  stage: deploy-production
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync curl
    - eval $(ssh-agent -s)
    - echo "$PROD_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$PROD_LXC_IP" >> ~/.ssh/known_hosts
  script:
    - |
      ssh root@$PROD_LXC_IP "
        docker compose -f /opt/$CI_PROJECT_NAME/docker-compose.yml pull &&
        docker compose -f /opt/$CI_PROJECT_NAME/docker-compose.yml up -d --remove-orphans
      "
    - |
      rsync -avz --delete \
        --timeout=30 \
        --exclude=".env" \
        --exclude="secrets/" \
        --exclude="*.key" \
        --exclude="*.pem" \
        --stats \
        ${RSYNC_BACKUP_DEST:+--backup --backup-dir="$RSYNC_BACKUP_DEST/$(date +%Y%m%d-%H%M%S)"} \
        -e "ssh -o StrictHostKeyChecking=no -o BatchMode=yes" \
        ./config/ \
        root@$PROD_LXC_IP:/opt/$CI_PROJECT_NAME/config/
    - |
      GITLAB_URL="$CI_SERVER_URL" \
      GITLAB_TOKEN="$GITLAB_API_TOKEN" \
      GITLAB_PROJECT_ID="$CI_PROJECT_ID" \
      DEPLOY_ENV="production" \
      LXC_ID="$PROD_LXC_VMID" \
      ./scripts/update-description.sh "$CI_COMMIT_TAG" "$CI_PROJECT_NAME"
  environment:
    name: production
    url: "http://$PROD_LXC_IP"
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - build:docker:production
  when: manual
