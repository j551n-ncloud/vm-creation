# Single pipeline for all service repos.
# Each service includes this file from the stack repo:
#
#   include:
#     - project: "${GITOPS_REPO_PATH}"
#       ref: main
#       file: gitlab/service-pipeline.yml
#
# Required CI variables (set per service project in GitLab):
#   GITOPS_REPO_PATH     e.g. mygroup/proxmox-gitlab-stack
#   STAGING_LXC_IP       IP of staging LXC
#   STAGING_LXC_VMID     Container ID shown in description
#   STAGING_SSH_KEY      SSH private key for staging LXC
#   PROD_LXC_IP          IP of production LXC
#   PROD_LXC_VMID        Container ID shown in description
#   PROD_SSH_KEY         SSH private key for production LXC
#   GITLAB_API_TOKEN     Token with api scope

stages:
  - validate
  - build
  - deploy

# ── Validate (every push) ────────────────────────────────────────────────────

lint:
  stage: validate
  image: hadolint/hadolint:latest-alpine
  script:
    - find . -name "Dockerfile*" -exec hadolint {} \; 2>/dev/null || true
    - find . -name "*.yml" -not -path "./.git/*" | head -20 | xargs -I{} sh -c 'echo "checking {}" && cat {} > /dev/null'
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

# ── Staging (branch: stage) ──────────────────────────────────────────────────

build:stage:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker tag  "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE:stage-latest"
    - docker push "$CI_REGISTRY_IMAGE:stage-latest"
  rules:
    - if: $CI_COMMIT_BRANCH == "stage"

deploy:stage:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client curl
    - eval $(ssh-agent -s)
    - echo "$STAGING_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$STAGING_LXC_IP" >> ~/.ssh/known_hosts
  script:
    - |
      ssh root@$STAGING_LXC_IP "
        cd /opt/$CI_PROJECT_NAME
        IMAGE_TAG=$CI_COMMIT_SHORT_SHA docker compose pull
        IMAGE_TAG=$CI_COMMIT_SHORT_SHA docker compose up -d --remove-orphans
      "
    - |
      curl -sf --request PUT \
        --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
        --data-urlencode "description=🚀 STAGING | $CI_COMMIT_SHORT_SHA | LXC:$STAGING_LXC_VMID | deployed $(date '+%Y-%m-%d %H:%M') | $CI_PROJECT_NAME" \
        "$CI_SERVER_URL/api/v4/projects/$CI_PROJECT_ID"
  environment:
    name: staging
    url: "http://$STAGING_LXC_IP"
  needs: [build:stage]
  rules:
    - if: $CI_COMMIT_BRANCH == "stage"

# ── Production (git tag) ─────────────────────────────────────────────────────

build:production:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
    - docker tag  "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG" "$CI_REGISTRY_IMAGE:latest"
    - docker push "$CI_REGISTRY_IMAGE:latest"
  rules:
    - if: $CI_COMMIT_TAG

deploy:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync curl
    - eval $(ssh-agent -s)
    - echo "$PROD_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$PROD_LXC_IP" >> ~/.ssh/known_hosts
  script:
    - |
      ssh root@$PROD_LXC_IP "
        cd /opt/$CI_PROJECT_NAME
        IMAGE_TAG=$CI_COMMIT_TAG docker compose pull
        IMAGE_TAG=$CI_COMMIT_TAG docker compose up -d --remove-orphans
      "
    - |
      [ -d config ] && rsync -az --delete \
        --timeout=30 --exclude=".env" --exclude="secrets/" \
        ${RSYNC_BACKUP_DEST:+--backup --backup-dir="$RSYNC_BACKUP_DEST/$(date +%Y%m%d-%H%M%S)"} \
        -e "ssh -o StrictHostKeyChecking=no" \
        ./config/ root@$PROD_LXC_IP:/opt/$CI_PROJECT_NAME/config/ || true
    - |
      curl -sf --request PUT \
        --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
        --data-urlencode "description=🚀 PRODUCTION | $CI_COMMIT_TAG | LXC:$PROD_LXC_VMID | deployed $(date '+%Y-%m-%d %H:%M') | $CI_PROJECT_NAME" \
        "$CI_SERVER_URL/api/v4/projects/$CI_PROJECT_ID"
  environment:
    name: production
    url: "http://$PROD_LXC_IP"
  needs: [build:production]
  rules:
    - if: $CI_COMMIT_TAG
  when: manual
