---
- name: Interactive GitOps Stack Initialization
  hosts: localhost
  gather_facts: true

  vars_prompt:
    - name: proxmox_api_url
      prompt: "Proxmox API URL (e.g. https://pve01:8006)"
      private: false

    - name: proxmox_api_token
      prompt: "Proxmox API Token (user@realm!tokenid=secret)"
      private: true

    - name: proxmox_nodes_input
      prompt: "Proxmox nodes (comma-separated, e.g. pve01,pve02)"
      private: false
      default: "pve01"

    - name: lxc_password
      prompt: "LXC root password"
      private: true
      confirm: true

    - name: gitlab_url
      prompt: "GitLab URL (e.g. https://gitlab.example.com)"
      private: false

    - name: gitlab_api_token
      prompt: "GitLab API token (api scope)"
      private: true

    - name: gitlab_project_path
      prompt: "GitLab project path for this stack (e.g. mygroup/proxmox-stack)"
      private: false

  tasks:
    - name: Parse node list
      ansible.builtin.set_fact:
        proxmox_nodes: "{{ proxmox_nodes_input.split(',') | map('trim') | list }}"

    # ── Terraform install ────────────────────────────────────────────────────

    - name: Check if Terraform is installed
      ansible.builtin.command: terraform version
      register: terraform_check
      changed_when: false
      failed_when: false

    - name: Install Terraform (Linux)
      when: terraform_check.rc != 0 and ansible_system == "Linux"
      block:
        - name: Get latest Terraform version
          ansible.builtin.uri:
            url: https://checkpoint-api.hashicorp.com/v1/check/terraform
          register: tf_ver

        - name: Download and install Terraform
          ansible.builtin.unarchive:
            src: "https://releases.hashicorp.com/terraform/{{ tf_ver.json.current_version }}/terraform_{{ tf_ver.json.current_version }}_linux_amd64.zip"
            dest: /usr/local/bin/
            remote_src: true
            mode: "0755"

    - name: Install Terraform (macOS)
      when: terraform_check.rc != 0 and ansible_system == "Darwin"
      ansible.builtin.command: brew install terraform
      changed_when: true

    # ── Fetch GitLab info automatically ─────────────────────────────────────

    - name: Fetch project ID from GitLab
      ansible.builtin.uri:
        url: "{{ gitlab_url }}/api/v4/projects/{{ gitlab_project_path | urlencode | replace('/', '%2F') }}"
        headers:
          PRIVATE-TOKEN: "{{ gitlab_api_token }}"
      register: gitlab_project

    - name: Create GitLab Runner via API
      ansible.builtin.uri:
        url: "{{ gitlab_url }}/api/v4/user/runners"
        method: POST
        headers:
          PRIVATE-TOKEN: "{{ gitlab_api_token }}"
        body_format: json
        body:
          runner_type: instance_type
          description: "gitops-runner"
          tag_list: ["docker", "gitops"]
          run_untagged: true
        status_code: [200, 201]
      register: gitlab_runner

    - name: Show fetched values
      ansible.builtin.debug:
        msg:
          - "Project ID: {{ gitlab_project.json.id }}"
          - "Runner token: {{ gitlab_runner.json.token }}"

    # ── Write config files ───────────────────────────────────────────────────

    - name: Write terraform.auto.tfvars (credentials only — does not touch terraform.tfvars)
      ansible.builtin.template:
        src: templates/terraform.auto.tfvars.j2
        dest: "{{ playbook_dir }}/../terraform/terraform.auto.tfvars"
        mode: "0600"

    - name: Write secrets vars
      ansible.builtin.copy:
        content: |
          gitlab_url: "{{ gitlab_url }}"
          gitlab_api_token: "{{ gitlab_api_token }}"
          gitlab_runner_token: "{{ gitlab_runner.json.token }}"
          gitlab_project_id: "{{ gitlab_project.json.id }}"
          lxc_password: "{{ lxc_password }}"
        dest: "{{ playbook_dir }}/vars/secrets.yml"
        mode: "0600"

    # ── Terraform ────────────────────────────────────────────────────────────

    - name: Terraform init
      ansible.builtin.command:
        cmd: terraform init
        chdir: "{{ playbook_dir }}/../terraform"
      changed_when: true

    - name: Terraform plan
      ansible.builtin.command:
        cmd: terraform plan -out=tfplan
        chdir: "{{ playbook_dir }}/../terraform"
      changed_when: true

    - name: Confirm apply
      ansible.builtin.pause:
        prompt: "Review plan above. Press ENTER to apply or Ctrl+C to abort"

    - name: Terraform apply
      ansible.builtin.command:
        cmd: terraform apply tfplan
        chdir: "{{ playbook_dir }}/../terraform"
      changed_when: true

    - name: Wait for LXCs to boot
      ansible.builtin.pause:
        seconds: 30
        prompt: "Waiting 30s for containers..."

- name: Install Docker on service LXCs
  import_playbook: docker-install.yml

- name: Install and register GitLab Runners
  import_playbook: runner-install.yml

- name: Initialize Vault
  import_playbook: vault-setup.yml

- name: Setup health checks
  import_playbook: health-check.yml
