---
# Requires vars/secrets.yml — run configure.yml first if it doesn't exist.
- name: Verify credentials exist
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Check vars/secrets.yml exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/vars/secrets.yml"
      register: secrets_file

    - name: Abort if not configured
      ansible.builtin.fail:
        msg: |
          vars/secrets.yml not found.
          Run first:  ansible-playbook ansible/configure.yml
      when: not secrets_file.stat.exists

- name: Deploy infrastructure
  hosts: localhost
  gather_facts: true

  vars_files:
    - vars/secrets.yml

  tasks:
    - name: Check if Terraform is installed
      ansible.builtin.command: terraform version
      register: terraform_check
      changed_when: false
      failed_when: false

    - name: Install Terraform (Linux)
      when: terraform_check.rc != 0 and ansible_facts['system'] == "Linux"
      block:
        - name: Get latest Terraform version
          ansible.builtin.uri:
            url: https://checkpoint-api.hashicorp.com/v1/check/terraform
          register: tf_ver

        - name: Download and install Terraform
          ansible.builtin.unarchive:
            src: "https://releases.hashicorp.com/terraform/{{ tf_ver.json.current_version }}/terraform_{{ tf_ver.json.current_version }}_linux_amd64.zip"
            dest: /usr/local/bin/
            remote_src: true
            mode: "0755"

    - name: Install Terraform (macOS)
      when: terraform_check.rc != 0 and ansible_facts['system'] == "Darwin"
      ansible.builtin.command: brew install terraform
      changed_when: true

    - name: Terraform init
      ansible.builtin.command:
        cmd: terraform init
        chdir: "{{ playbook_dir }}/../terraform"
      changed_when: true

    - name: Terraform plan
      ansible.builtin.command:
        cmd: terraform plan -out=tfplan
        chdir: "{{ playbook_dir }}/../terraform"
      changed_when: true

    - name: Confirm apply
      ansible.builtin.pause:
        prompt: "Review plan above. Press ENTER to apply or Ctrl+C to abort"

    - name: Terraform apply
      ansible.builtin.command:
        cmd: terraform apply tfplan
        chdir: "{{ playbook_dir }}/../terraform"
      changed_when: true

    - name: Wait for LXCs to boot
      ansible.builtin.pause:
        seconds: 30
        prompt: "Waiting 30s for containers..."

- name: Install Docker on service LXCs
  import_playbook: docker-install.yml

- name: Install and register GitLab Runners
  import_playbook: runner-install.yml

- name: Initialize Vault
  import_playbook: vault-setup.yml

- name: Setup health checks
  import_playbook: health-check.yml
