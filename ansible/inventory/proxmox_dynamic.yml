plugin: community.general.proxmox
url: "{{ lookup('env', 'PROXMOX_URL') }}"
token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
validate_certs: false

want_facts: true
want_proxmox_nodes_ansible_host: true

groups:
  lxc_containers: item.type == 'lxc'
  vms: item.type == 'qemu'

compose:
  ansible_host: proxmox_ipconfig0 | regex_replace('ip=([^/]+).*', '\\1') | default(proxmox_net0 | regex_replace('.*ip=([^,]+).*', '\\1'))
  ansible_user: "'root'"
  ansible_python_interpreter: "'/usr/bin/python3'"
