---
# Usage:
#   ansible-playbook ansible/add-service.yml \
#     -e service_name=vaultwarden \
#     -e service_vmid=202 \
#     -e service_ip=192.168.1.202

- name: Create LXC and GitLab repo for new service
  hosts: localhost
  gather_facts: true

  vars_files:
    - vars/secrets.yml

  vars:
    service_node:    "{{ service_node    | default('pve01') }}"
    service_port:    "{{ service_port    | default('8080') }}"
    service_memory:  "{{ service_memory  | default(512) }}"
    service_disk_gb: "{{ service_disk_gb | default(10) }}"
    service_cores:   "{{ service_cores   | default(1) }}"

  tasks:
    - name: Require service_name, service_vmid, service_ip
      ansible.builtin.assert:
        that:
          - service_name is defined
          - service_vmid is defined
          - service_ip   is defined
        fail_msg: "Pass -e service_name=X -e service_vmid=Y -e service_ip=Z"

    - name: Create LXC
      community.general.proxmox:
        api_host:         "{{ proxmox_api_url | urlsplit('hostname') }}"
        api_token_id:     "{{ proxmox_token_id }}"
        api_token_secret: "{{ proxmox_token_secret }}"
        validate_certs: false
        vmid:       "{{ service_vmid }}"
        node:       "{{ service_node }}"
        hostname:   "{{ service_name }}"
        ostemplate: "{{ lxc_template }}"
        password:   "{{ lxc_password }}"
        storage:    "{{ lxc_storage | default('local-lvm') }}"
        disk:       "{{ service_disk_gb }}"
        memory:     "{{ service_memory }}"
        cores:      "{{ service_cores }}"
        netif:
          net0: "name=eth0,bridge=vmbr0,ip={{ service_ip }}/24,gw={{ ip_gateway | default('192.168.1.1') }}"
        features:
          - nesting=1
          - keyctl=1
        onboot: true
        state: present

    - name: Start LXC
      community.general.proxmox:
        api_host:         "{{ proxmox_api_url | urlsplit('hostname') }}"
        api_token_id:     "{{ proxmox_token_id }}"
        api_token_secret: "{{ proxmox_token_secret }}"
        validate_certs: false
        vmid:  "{{ service_vmid }}"
        node:  "{{ service_node }}"
        state: started

    - name: Wait for SSH
      ansible.builtin.wait_for:
        host:    "{{ service_ip }}"
        port:    22
        timeout: 60

    - name: Create GitLab repo for service
      ansible.builtin.uri:
        url: "{{ gitlab_url }}/api/v4/projects"
        method: POST
        headers:
          PRIVATE-TOKEN: "{{ gitlab_api_token }}"
        body_format: json
        body:
          name:        "{{ service_name }}"
          path:        "{{ service_name }}"
          namespace_id: "{{ gitlab_namespace_id | default(omit) }}"
          visibility:  private
          description: "Service: {{ service_name }}"
          initialize_with_readme: false
        status_code: [200, 201, 409]
      register: new_repo

    - name: Push .gitlab-ci.yml into service repo
      ansible.builtin.shell:
        cmd: |
          set -e
          TMP=$(mktemp -d)
          cp {{ playbook_dir }}/../gitlab/submodule-template/.gitlab-ci.yml "$TMP/"
          cd "$TMP"
          git init
          git add .gitlab-ci.yml
          git commit -m "chore: init pipeline"
          git push \
            "https://oauth2:{{ gitlab_api_token }}@{{ gitlab_url | urlsplit('hostname') }}/\
{{ gitlab_namespace | default(new_repo.json.namespace.path) }}/{{ service_name }}.git" \
            HEAD:main
          rm -rf "$TMP"
      when: new_repo.status in [200, 201]
      changed_when: true

    - name: Add host for Docker + health-check install
      ansible.builtin.add_host:
        name:          "{{ service_name }}"
        ansible_host:  "{{ service_ip }}"
        ansible_user:  root
        service_name:  "{{ service_name }}"
        service_port:  "{{ service_port }}"
        service_vmid:  "{{ service_vmid }}"

- name: Install Docker and health check on new LXC
  hosts: "{{ service_name }}"
  gather_facts: true

  vars_files:
    - vars/secrets.yml

  vars:
    gitlab_project_id: "{{ hostvars['localhost']['new_repo'].json.id }}"

  roles:
    - role: docker_install

  tasks:
    - name: Copy health-check script
      ansible.builtin.copy:
        src:  "{{ playbook_dir }}/../scripts/health-check.sh"
        dest: /usr/local/bin/health-check.sh
        mode: "0755"

    - name: Install health-check cronjob
      ansible.builtin.cron:
        name:   "health check {{ service_name }}"
        minute: "*/5"
        job: >
          GITLAB_URL="{{ gitlab_url }}"
          GITLAB_TOKEN="{{ gitlab_api_token }}"
          GITLAB_PROJECT_ID="{{ gitlab_project_id }}"
          LXC_ID="{{ service_vmid }}"
          /usr/local/bin/health-check.sh >> /var/log/health-check.log 2>&1
        user:  root
        state: present
