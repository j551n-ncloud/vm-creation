---
- name: Create service directory
  ansible.builtin.file:
    path: "{{ service_base_path }}/{{ service_name }}/secrets"
    state: directory
    mode: "0750"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ service_base_path }}/{{ service_name }}/docker-compose.yml"
    mode: "0640"

- name: Deploy .env file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ service_base_path }}/{{ service_name }}/.env"
    mode: "0600"

- name: Deploy Vault agent config
  ansible.builtin.template:
    src: vault-agent.hcl.j2
    dest: "{{ service_base_path }}/{{ service_name }}/secrets/vault-agent.hcl"
    mode: "0640"

- name: Deploy Vault env template
  ansible.builtin.template:
    src: env.ctmpl.j2
    dest: "{{ service_base_path }}/{{ service_name }}/secrets/env.ctmpl"
    mode: "0640"

# Policy must exist before the role references it
- name: Create Vault policy for service
  ansible.builtin.uri:
    url: "{{ vault_addr }}/v1/sys/policies/acl/{{ service_name }}-policy"
    method: POST
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
    body_format: json
    body:
      policy: |
        path "secret/data/{{ service_name }}/*" {
          capabilities = ["read"]
        }
    status_code: [200, 204]
  delegate_to: localhost

- name: Enable AppRole auth method (idempotent)
  ansible.builtin.uri:
    url: "{{ vault_addr }}/v1/sys/auth/approle"
    method: POST
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
    body_format: json
    body:
      type: approle
    status_code: [200, 204, 400]
  delegate_to: localhost

- name: Create Vault AppRole for service
  ansible.builtin.uri:
    url: "{{ vault_addr }}/v1/auth/approle/role/{{ service_name }}"
    method: POST
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
    body_format: json
    body:
      token_policies: ["{{ service_name }}-policy"]
      token_ttl: "1h"
      token_max_ttl: "24h"
    status_code: [200, 204]
  delegate_to: localhost

- name: Fetch AppRole role_id
  ansible.builtin.uri:
    url: "{{ vault_addr }}/v1/auth/approle/role/{{ service_name }}/role-id"
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
  register: approle_role_id
  delegate_to: localhost

- name: Generate AppRole secret_id
  ansible.builtin.uri:
    url: "{{ vault_addr }}/v1/auth/approle/role/{{ service_name }}/secret-id"
    method: POST
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
  register: approle_secret_id
  delegate_to: localhost

- name: Write role_id to LXC
  ansible.builtin.copy:
    content: "{{ approle_role_id.json.data.role_id }}"
    dest: "{{ service_base_path }}/{{ service_name }}/secrets/role_id"
    mode: "0400"

- name: Write secret_id to LXC
  ansible.builtin.copy:
    content: "{{ approle_secret_id.json.data.secret_id }}"
    dest: "{{ service_base_path }}/{{ service_name }}/secrets/secret_id"
    mode: "0400"

- name: Pull and start service via docker compose
  ansible.builtin.command:
    cmd: docker compose up -d --pull always --remove-orphans
    chdir: "{{ service_base_path }}/{{ service_name }}"
  changed_when: true
