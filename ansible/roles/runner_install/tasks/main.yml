---
- name: Add GitLab Runner repo key
  ansible.builtin.apt_key:
    url: https://packages.gitlab.com/runner/gitlab-runner/gpgkey
    state: present

- name: Add GitLab Runner repository
  ansible.builtin.apt_repository:
    repo: "deb https://packages.gitlab.com/runner/gitlab-runner/debian/ {{ ansible_distribution_release }} main"
    state: present
    filename: gitlab-runner

- name: Install GitLab Runner
  ansible.builtin.apt:
    name: gitlab-runner
    state: present
    update_cache: true

- name: Enable and start GitLab Runner
  ansible.builtin.systemd:
    name: gitlab-runner
    enabled: true
    state: started

- name: Check if runner already registered
  ansible.builtin.stat:
    path: /etc/gitlab-runner/config.toml
  register: runner_config

- name: Register runner (GitLab 16+ auth token)
  ansible.builtin.command:
    cmd: >
      gitlab-runner register
      --non-interactive
      --url "{{ gitlab_url }}"
      --token "{{ gitlab_runner_token }}"
      --executor docker
      --docker-image alpine:latest
      --description "runner-{{ inventory_hostname }}"
      --docker-volumes /var/run/docker.sock:/var/run/docker.sock
  when: runner_config.stat.size | default(0) < 100
  changed_when: true

- name: Set concurrent jobs
  ansible.builtin.lineinfile:
    path: /etc/gitlab-runner/config.toml
    regexp: '^concurrent'
    line: "concurrent = {{ runner_concurrent | default(4) }}"
