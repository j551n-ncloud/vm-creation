---
- name: Deploy health check scripts and cronjobs
  hosts: services
  gather_facts: true

  vars_files:
    - vars/secrets.yml

  vars:
    health_script_path: /usr/local/bin/health-check.sh

  tasks:
    - name: Copy health check script
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../scripts/health-check.sh"
        dest: "{{ health_script_path }}"
        mode: "0755"

    - name: Copy update-description script
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../scripts/update-description.sh"
        dest: /usr/local/bin/update-description.sh
        mode: "0755"

    - name: Install health check cronjob
      ansible.builtin.cron:
        name: "GitLab health check"
        minute: "*/5"
        job: >
          GITLAB_URL="{{ gitlab_url }}"
          GITLAB_TOKEN="{{ gitlab_api_token }}"
          GITLAB_PROJECT_ID="{{ gitlab_project_id | default('') }}"
          LXC_ID="{{ service_vmid | default('') }}"
          {{ health_script_path }} >> /var/log/health-check.log 2>&1
        user: root
        state: present
